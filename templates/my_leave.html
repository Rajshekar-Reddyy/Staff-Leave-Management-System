<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>My Leave Applications</h1>
    <table border="2px">
        <tr>
            <th>Leave Type</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Reason</th>
            <th>Status</th>
        </tr>
        {% for i in leaves %}
        <tr>
            <td>{{i.leave_type}}</td>
            <td>{{i.start_date}}</td>
            <td>{{i.end_date}}</td>
            <td>{{i.reason}}</td>
            <td>{{i.status}}</td>
        </tr>
        {% empty %}
        <tr>
            <td>No Leave Applications Found</td>
        </tr>
        {% endfor %}
    </table>
    <a href="{% url 'staff_dashboard' %}">Back to Dashboard</a>

</body>

</html>
